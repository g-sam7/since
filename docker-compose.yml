services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: since
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d since']
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

volumes:
  postgres-data: